name: "CodeQL"

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  schedule:
    - cron: "30 2 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  detect-languages:
    runs-on: ubuntu-latest
    outputs:
      languages: ${{ steps.detect.outputs.languages }}
      enabled: ${{ steps.detect.outputs.enabled }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          has_any() { for pattern in "$@"; do compgen -G "$pattern" >/dev/null && return 0; done; return 1; }
          langs=()
          has_any '**/*.js' '**/*.jsx' '**/*.mjs' '**/*.cjs' '**/*.ts' '**/*.tsx' && langs+=("javascript-typescript") || true
          has_any '**/*.py' && langs+=("python") || true
          has_any '**/*.go' && langs+=("go") || true
          has_any '**/*.java' '**/*.kt' '**/*.kts' && langs+=("java-kotlin") || true
          has_any '**/*.c' '**/*.h' '**/*.cpp' '**/*.cc' '**/*.cxx' '**/*.hpp' && langs+=("c-cpp") || true
          has_any '**/*.cs' && langs+=("csharp") || true
          has_any '**/*.rb' && langs+=("ruby") || true
          has_any '**/*.swift' && langs+=("swift") || true
          has_any '**/*.rs' && langs+=("rust") || true
          if [ ${#langs[@]} -eq 0 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "languages=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          json="["; for i in "${!langs[@]}"; do [ "$i" -gt 0 ] && json+=","; json+=""${langs[$i]}""; done; json+="]"
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "languages=$json" >> "$GITHUB_OUTPUT"

  analyze:
    needs: detect-languages
    if: needs.detect-languages.outputs.enabled == 'true' && github.event.repository.private == false
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect-languages.outputs.languages) }}
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
